<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: radial-gradient(120% 120% at 20% 0%, #16233f 0%, #0b0f1a 60%);
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    color: #e7ecf5;
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-app-region: drag;
  }
  .wrap { text-align: center; }
  .logo {
    width: 88px; height: 88px; margin: 0 auto 20px;
    border-radius: 22px;
    background: linear-gradient(135deg, #4f7cff 0%, #7b5bff 100%);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 12px 40px rgba(79, 124, 255, .35);
  }
  h1 { font-size: 17px; font-weight: 600; margin: 0 0 6px; letter-spacing: .2px; }
  p  { font-size: 12.5px; margin: 0 0 22px; color: #93a0b8; }
  .bar {
    width: 160px; height: 3px; margin: 0 auto; border-radius: 3px;
    background: rgba(255,255,255,.12); overflow: hidden;
  }
  .bar::after {
    content: ""; display: block; width: 40%; height: 100%;
    border-radius: 3px; background: linear-gradient(90deg, #4f7cff, #7b5bff);
    animation: slide 1.1s ease-in-out infinite;
  }
  @keyframes slide {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <svg width="46" height="46" viewBox="0 0 24 24" fill="none"
           stroke="#fff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2.5" width="6" height="11" rx="3"/>
        <path d="M5 11a7 7 0 0 0 14 0"/>
        <line x1="12" y1="18" x2="12" y2="21.5"/>
      </svg>
    </div>
    <h1>AI Sales Pitch Evaluator</h1>
    <p>Loading your workspace…</p>
    <div class="bar"></div>
  </div>
</body>
</html>
